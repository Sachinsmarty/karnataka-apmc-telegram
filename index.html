<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ಕರ್ನಾಟಕ ಕೃಷಿ ಮಾರುಕಟ್ಟೆ ದರ</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  text-align: center;
}

select, button {
  padding: 12px;
  margin: 8px;
  font-size: 16px;
}

#rate {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>🌾 ಕರ್ನಾಟಕ ಕೃಷಿ ಮಾರುಕಟ್ಟೆ ದರ</h1>

<h3>ಜಿಲ್ಲೆ ಆಯ್ಕೆ ಮಾಡಿ</h3>

<select id="district">
<option>ಚಾಮರಾಜನಗರ</option>
<option>ಮೈಸೂರು</option>
<option>ಮಂಡ್ಯ</option>
<option>ಹಾಸನ</option>
<option>ತುಮಕೂರು</option>
<option>ಕೊಡಗು</option>
<option>ಚಿಕ್ಕಮಗಳೂರು</option>
<option>ಶಿವಮೊಗ್ಗ</option>
<option>ದಕ್ಷಿಣ ಕನ್ನಡ</option>
<option>ಉಡುಪಿ</option>
<option>ಬಳ್ಳಾರಿ</option>
<option>ವಿಜಯನಗರ</option>
<option>ಕಲಬುರಗಿ</option>
<option>ಬೀದರ್</option>
<option>ರಾಯಚೂರು</option>
<option>ಬೆಳಗಾವಿ</option>
<option>ಧಾರವಾಡ</option>
<option>ಗದಗ</option>
<option>ಹಾವೇರಿ</option>
<option>ಕೊಪ್ಪಳ</option>
<option>ಚಿತ್ರದುರ್ಗ</option>
<option>ದಾವಣಗೆರೆ</option>
<option>ಚಿಕ್ಕಬಳ್ಳಾಪುರ</option>
<option>ಕೋಲಾರ</option>
<option>ಯಾದಗಿರಿ</option>
</select>

<h3>APMC ಮಾರುಕಟ್ಟೆ ಆಯ್ಕೆ ಮಾಡಿ</h3>

<select id="apmc">
<option>ಚಾಮರಾಜನಗರ APMC</option>
<option>ಕೊಳ್ಳೇಗಾಲ APMC</option>
</select>

<h3>ಬೆಳೆ ಆಯ್ಕೆ ಮಾಡಿ</h3>

<select id="crop">
<option>ರಾಗಿ</option>
<option>ಮೆಕ್ಕೆಜೋಳ</option>
<option>ಕಬ್ಬು</option>
<option>ಅಡಿಕೆ</option>
<option>ತೆಂಗು</option>
</select>

<br>

<button onclick="showRate()">ದರ ನೋಡಿ</button>

<div id="rate"></div>

<h3>📱 Telegram Channel</h3>

<a href="https://t.me/KarnatakaMarketprice" target="_blank">
<button>Telegram ಗೆ ಸೇರಿ</button>
</a>

<script>
async function showRate() {

 var districtSelect = document.getElementById("district");
var apmcSelect = document.getElementById("apmc");

var apmcData = {
  "ಚಾಮರಾಜನಗರ": ["ಚಾಮರಾಜನಗರ APMC", "ಕೊಳ್ಳೇಗಾಲ APMC"],
  "ಮೈಸೂರು": ["ಮೈಸೂರು APMC", "ಹುಣಸೂರು APMC", "ನಂಜನಗೂಡು APMC", "ಪಿರಿಯಾಪಟ್ಟಣ APMC"],
  "ಮಂಡ್ಯ": ["ಮಂಡ್ಯ APMC", "ಮದ್ದೂರು APMC", "ಮಳವಳ್ಳಿ APMC", "ಪಾಂಡವಪುರ APMC"],
  "ಹಾಸನ": ["ಹಾಸನ APMC", "ಅರಸೀಕೆರೆ APMC", "ಚನ್ನರಾಯಪಟ್ಟಣ APMC", "ಹೊಳೆನರಸೀಪುರ APMC"],
  "ತುಮಕೂರು": ["ತುಮಕೂರು APMC", "ತಿಪಟೂರು APMC", "ಕುಣಿಗಲ್ APMC", "ಶಿರಾ APMC"],
  "ಕೊಡಗು": ["ಮಡಿಕೇರಿ APMC", "ಸೋಮವಾರಪೇಟೆ APMC", "ವಿರಾಜಪೇಟೆ APMC"],
  "ಚಿಕ್ಕಮಗಳೂರು": ["ಚಿಕ್ಕಮಗಳೂರು APMC", "ಕಡೂರು APMC", "ತರೀಕೆರೆ APMC"],
  "ಶಿವಮೊಗ್ಗ": ["ಶಿವಮೊಗ್ಗ APMC", "ಭದ್ರಾವತಿ APMC", "ಸಾಗರ APMC", "ಶಿಕಾರಿಪುರ APMC"],
  "ದಕ್ಷಿಣ ಕನ್ನಡ": ["ಮಂಗಳೂರು APMC", "ಪುತ್ತೂರು APMC", "ಬೆಳ್ತಂಗಡಿ APMC"],
  "ಉಡುಪಿ": ["ಉಡುಪಿ APMC", "ಕುಂದಾಪುರ APMC", "ಕಾರ್ಕಳ APMC"],
  "ಬಳ್ಳಾರಿ": ["ಬಳ್ಳಾರಿ APMC", "ಸಿರುಗುಪ್ಪ APMC"],
  "ವಿಜಯನಗರ": ["ಹೊಸಪೇಟೆ APMC", "ಹರಪನಹಳ್ಳಿ APMC"],
  "ಕಲಬುರಗಿ": ["ಕಲಬುರಗಿ APMC", "ಆಳಂದ APMC", "ಜೇವರ್ಗಿ APMC"],
  "ಬೀದರ್": ["ಬೀದರ್ APMC", "ಬಸವಕಲ್ಯಾಣ APMC", "ಭಾಲ್ಕಿ APMC"],
  "ರಾಯಚೂರು": ["ರಾಯಚೂರು APMC", "ಮಾನ್ವಿ APMC", "ಸಿಂಧನೂರು APMC"],
  "ಬೆಳಗಾವಿ": ["ಬೆಳಗಾವಿ APMC", "ಚಿಕ್ಕೋಡಿ APMC", "ಗೋಕಾಕ APMC", "ಅಥಣಿ APMC"],
  "ಧಾರವಾಡ": ["ಧಾರವಾಡ APMC", "ಹುಬ್ಬಳ್ಳಿ APMC", "ಕಲಘಟಗಿ APMC"],
  "ಗದಗ": ["ಗದಗ APMC", "ರೋಣ APMC", "ನರಗುಂದ APMC"],
  "ಹಾವೇರಿ": ["ಹಾವೇರಿ APMC", "ರಾಣೇಬೆನ್ನೂರು APMC", "ಹಾನಗಲ್ APMC"],
  "ಕೊಪ್ಪಳ": ["ಕೊಪ್ಪಳ APMC", "ಗಂಗಾವತಿ APMC", "ಕುಷ್ಟಗಿ APMC"],
  "ಚಿತ್ರದುರ್ಗ": ["ಚಿತ್ರದುರ್ಗ APMC", "ಹೊಸದುರ್ಗ APMC", "ಚಳ್ಳಕೆರೆ APMC"],
  "ದಾವಣಗೆರೆ": ["ದಾವಣಗೆರೆ APMC", "ಹರಿಹರ APMC", "ಚನ್ನಗಿರಿ APMC"],
  "ಚಿಕ್ಕಬಳ್ಳಾಪುರ": ["ಚಿಕ್ಕಬಳ್ಳಾಪುರ APMC", "ಚಿಂತಾಮಣಿ APMC", "ಬಾಗೇಪಲ್ಲಿ APMC"],
  "ಕೋಲಾರ": ["ಕೋಲಾರ APMC", "ಮುಳಬಾಗಿಲು APMC", "ಬಂಗಾರಪೇಟೆ APMC"],
  "ಯಾದಗಿರಿ": ["ಯಾದಗಿರಿ APMC", "ಶಹಾಪುರ APMC", "ಸುರಪುರ APMC"]
};

districtSelect.addEventListener("change", function() {
  var selectedDistrict = districtSelect.value;

  apmcSelect.innerHTML = "";

  var markets = apmcData[selectedDistrict] || [];

  for (var i = 0; i < markets.length; i++) {
    var option = document.createElement("option");
    option.textContent = markets[i];
    option.value = markets[i];
    apmcSelect.appendChild(option);
  }
}); 
  var district = document.getElementById("district").value;
  var apmc = document.getElementById("apmc").value;
  var crop = document.getElementById("crop").value;

  try {

    var response = await fetch("market.json");
    var data = await response.json();

    var rate = "ದರ ಲಭ್ಯವಿಲ್ಲ";

    for (var i = 0; i < data.prices.length; i++) {
      if (data.prices[i].product == crop) {
        rate = data.prices[i].price;
      }
    }

    document.getElementById("rate").innerHTML =
      "📍 ಜಿಲ್ಲೆ: " + district +
      "<br>🏪 APMC: " + apmc +
      "<br>🌾 ಬೆಳೆ: " + crop +
      "<br>💰 ಇಂದಿನ ದರ: " + rate;

  } catch (error) {

    document.getElementById("rate").innerHTML =
      "⚠️ ದರ ಪಡೆಯಲು ಸಾಧ್ಯವಾಗುತ್ತಿಲ್ಲ.";

  }
}
</script>









</body>
</html>
